name: CMake Build & Test with Redis 8 (Ubuntu Runner)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        build_type: [ Debug, Release ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Dependencies & Redis Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libhiredis-dev git

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DENABLE_JANUS_TEST=ON
          -S .

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j $(nproc)

      - name: Test
        env:
          REDIS_HOST: tcp://127.0.0.1:6379
        run: ctest --build-config ${{ matrix.build_type }} --test-dir build --output-on-failure
